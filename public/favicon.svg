<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf8f0"/>
      <stop offset="1" stop-color="#f5ecdc"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- notepad / shopping list, offset to upper-left and behind the emoji -->
  <g transform="translate(60, 56) rotate(-4 100 180)">
    <rect x="0" y="0" width="230" height="290" rx="18" fill="#fffdf9" stroke="#e8ddc8" stroke-width="4"/>
    <!-- spiral binding dots along the top -->
    <circle cx="40" cy="0" r="7" fill="#e8ddc8"/>
    <circle cx="78" cy="0" r="7" fill="#e8ddc8"/>
    <circle cx="116" cy="0" r="7" fill="#e8ddc8"/>
    <circle cx="154" cy="0" r="7" fill="#e8ddc8"/>
    <circle cx="192" cy="0" r="7" fill="#e8ddc8"/>

    <!-- list lines with checkmarks -->
    <g>
      <rect x="26" y="48" width="26" height="26" rx="6" fill="none" stroke="#6b7c5e" stroke-width="5"/>
      <path d="M 32 61 L 38 67 L 48 53" fill="none" stroke="#6b7c5e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="64" y="55" width="138" height="12" rx="6" fill="#e8ddc8"/>
    </g>
    <g>
      <rect x="26" y="98" width="26" height="26" rx="6" fill="none" stroke="#6b7c5e" stroke-width="5"/>
      <path d="M 32 111 L 38 117 L 48 103" fill="none" stroke="#6b7c5e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="64" y="105" width="110" height="12" rx="6" fill="#e8ddc8"/>
    </g>
    <g>
      <rect x="26" y="148" width="26" height="26" rx="6" fill="none" stroke="#c1432f" stroke-width="5"/>
      <rect x="64" y="155" width="150" height="12" rx="6" fill="#e8ddc8"/>
    </g>
    <g>
      <rect x="26" y="198" width="26" height="26" rx="6" fill="none" stroke="#c1432f" stroke-width="5"/>
      <rect x="64" y="205" width="95" height="12" rx="6" fill="#e8ddc8"/>
    </g>
  </g>

  <!-- soft shadow under the emoji for separation -->
  <ellipse cx="320" cy="400" rx="120" ry="22" fill="#2a2420" opacity="0.10"/>

  <!-- the gyoza emoji itself, large, in front -->
  <text x="320" y="368" font-size="300" text-anchor="middle" dominant-baseline="middle">🥟</text>
</svg>
