<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf8f0"/>
      <stop offset="1" stop-color="#f5ecdc"/>
    </linearGradient>
    <linearGradient id="dumpling" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecd2b2"/>
      <stop offset="0.5" stop-color="#dba876"/>
      <stop offset="1" stop-color="#c1432f"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- plate shadow -->
  <ellipse cx="256" cy="368" rx="172" ry="18" fill="#2a2420" opacity="0.08"/>

  <!-- gyoza body: wide flat crescent, pleated top, seared flat bottom -->
  <path d="
    M 86 318
    C 86 250 140 130 256 130
    C 372 130 426 250 426 318
    C 426 332 410 340 396 340
    L 116 340
    C 102 340 86 332 86 318
    Z"
    fill="url(#dumpling)" stroke="#9c3525" stroke-width="7" stroke-linejoin="round"/>

  <!-- seared flat bottom strip -->
  <path d="M 86 318 C 86 332 102 340 116 340 L 396 340 C 410 340 426 332 426 318 L 426 326 C 426 340 410 348 396 348 L 116 348 C 102 348 86 340 86 326 Z" fill="#9c3525"/>

  <!-- bold pleated crimp along the top curve, the gyoza's signature fan-fold -->
  <g fill="none" stroke="#9c3525" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 150 178 C 158 160 172 160 180 176"/>
    <path d="M 180 176 C 188 158 204 158 212 174"/>
    <path d="M 212 174 C 220 154 238 154 246 170"/>
    <path d="M 246 170 C 252 150 262 148 268 168"/>
    <path d="M 268 168 C 276 152 294 154 300 172"/>
    <path d="M 300 172 C 308 156 326 158 332 176"/>
    <path d="M 332 176 C 340 160 354 160 362 178"/>
  </g>

  <!-- soft highlight for dimension -->
  <path d="M 130 250 C 132 195 175 150 220 138" fill="none" stroke="#fff8ec" stroke-width="14" stroke-linecap="round" opacity="0.4"/>

  <!-- steam wisp -->
  <path d="M 256 110 Q 242 90 256 70 Q 270 50 256 30" fill="none" stroke="#6b7c5e" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
</svg>
